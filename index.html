<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Long Pham</title>
    <style>
      :root {
        --bg: #f6faf6;
        --surface: #ffffff;
        --text: #102014;
        --muted: #49604e;
        --line: #d6e3d7;
        --accent: #1f6f49;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, var(--bg), #ffffff);
        color: var(--text);
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 8px 20px rgba(17, 44, 23, 0.04);
      }

      h1 {
        margin: 0 0 12px;
        color: #134d32;
      }

      p {
        line-height: 1.55;
      }

      .muted {
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Long Pham</h1>
        <p class="muted">Project support pages and app policies.</p>
        <p>
          FoodLens:
          <a href="/foodlens/support/">Support</a>
          and
          <a href="/foodlens/privacy/">Privacy Policy</a>.
        </p>
      </section>
    </main>
  </body>
</html>
